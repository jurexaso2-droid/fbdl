<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RexDev FB Downloader</title>
    <style>
        :root { --primary: #1877f2; --bg: #f0f2f5; --text: #1c1e21; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        
        .container { background: white; width: 90%; max-width: 450px; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        h1 { font-size: 22px; color: var(--primary); margin-bottom: 5px; }
        .subtitle { font-size: 12px; color: #65676b; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; }

        .input-box { position: relative; margin-bottom: 15px; }
        input { width: 100%; padding: 12px 15px; border: 2px solid #ddd; border-radius: 8px; font-size: 15px; box-sizing: border-box; transition: border-color 0.3s; }
        input:focus { border-color: var(--primary); outline: none; }
        
        button#dlBtn { width: 100%; background: var(--primary); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.2s; }
        button#dlBtn:hover { background: #166fe5; }
        button#dlBtn:disabled { background: #bdc3c7; cursor: not-allowed; }

        /* Result Card */
        #result { margin-top: 25px; display: none; text-align: left; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .video-preview { border: 1px solid #ddd; border-radius: 10px; overflow: hidden; background: #fff; }
        .thumb { width: 100%; height: 200px; object-fit: cover; background: #000; }
        .details { padding: 15px; }
        .video-title { font-weight: bold; font-size: 16px; margin-bottom: 10px; display: block; }
        
        .action-btn { display: block; background: #28a745; color: white; text-align: center; text-decoration: none; padding: 10px; border-radius: 6px; font-weight: bold; margin-top: 10px; }
        .action-btn:hover { background: #218838; }

        .meta { font-size: 11px; color: #999; margin-top: 15px; text-align: center; }
        .loader { display: none; margin: 20px auto; border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .error-msg { color: #d32f2f; background: #ffebee; padding: 10px; border-radius: 8px; font-size: 14px; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h1>FB Downloader</h1>
    <div class="subtitle">Powered by RexDev</div>

    <div class="input-box">
        <input type="text" id="fbUrl" placeholder="Paste video link here..." />
    </div>
    <button id="dlBtn" onclick="fetchVideo()">Get Video</button>

    <div id="loader" class="loader"></div>

    <div id="result">
        <!-- Data will be injected here -->
    </div>
</div>

<script>
    async function fetchVideo() {
        const input = document.getElementById('fbUrl');
        const btn = document.getElementById('dlBtn');
        const resultDiv = document.getElementById('result');
        const loader = document.getElementById('loader');

        if (!input.value.trim()) {
            alert("Please paste a URL!");
            return;
        }

        // UI State
        resultDiv.style.display = "none";
        loader.style.display = "block";
        btn.disabled = true;

        try {
            const apiUrl = `https://shin-apis.gleeze.com/downloader/fbdl?url=${encodeURIComponent(input.value.trim())}`;
            const response = await fetch(apiUrl);
            const data = await response.json();

            loader.style.display = "none";
            btn.disabled = false;

            if (data.answer && data.answer.url) {
                // SUCCESS
                resultDiv.style.display = "block";
                resultDiv.innerHTML = `
                    <div class="video-preview">
                        <img src="${data.answer.thumbnail}" class="thumb" alt="Thumbnail">
                        <div class="details">
                            <span class="video-title">${data.answer.title || 'Facebook Video'}</span>
                            <a href="${data.answer.url}" target="_blank" class="action-btn">Download MP4 Video</a>
                        </div>
                    </div>
                    <div class="meta">
                        Operator: ${data.operator} | Response: ${data.responseTime}
                    </div>
                `;
            } else if (data.error) {
                // API ERROR
                resultDiv.style.display = "block";
                resultDiv.innerHTML = `<div class="error-msg"><strong>Error:</strong> ${data.error}</div>`;
            } else {
                // UNKNOWN ERROR
                resultDiv.style.display = "block";
                resultDiv.innerHTML = `<div class="error-msg">Unable to parse video. The link may be private or invalid.</div>`;
            }

        } catch (err) {
            loader.style.display = "none";
            btn.disabled = false;
            resultDiv.style.display = "block";
            resultDiv.innerHTML = `<div class="error-msg">Network Error: Could not connect to the API.</div>`;
            console.error(err);
        }
    }
</script>

</body>
</html>
